<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Saving IoT</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
    h2 { font-size: 20px; margin-bottom: 16px; }

    .row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .box { flex: 1; min-width: 130px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 14px; text-align: center; }
    .label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 6px; }
    .val { font-size: 22px; font-weight: bold; color: #16a34a; }
    .val.dark { color: #222; }

    .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .card b { display: block; margin-bottom: 10px; font-size: 14px; }

    table { width: 100%; font-size: 13px; border-collapse: collapse; }
    td { padding: 7px 0; border-bottom: 1px solid #f0f0f0; }
    td:last-child { font-weight: 600; text-align: right; }
    tr:last-child td { border-bottom: none; }

    .log-item { font-size: 13px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; }
    .log-item:last-child { border-bottom: none; }
    .log-item .nom { font-weight: bold; color: #16a34a; }
    .log-item .time { color: #aaa; font-size: 11px; }
    .empty { font-size: 13px; color: #aaa; }

    /* MQTT CONFIG */
    .config { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .config b { display: block; margin-bottom: 10px; font-size: 14px; }
    .fields { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 12px; }
    .field label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
    .field input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    .field input:focus { outline: none; border-color: #16a34a; }

    .status-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; margin-bottom: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .dot.on { background: #22c55e; }

    button { padding: 10px 20px; border-radius: 6px; border: none; font-size: 14px; cursor: pointer; }
    .btn-green { background: #16a34a; color: #fff; }
    .btn-gray { background: #e5e7eb; color: #444; }
    .btn-blue { background: #2563eb; color: #fff; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .orange { color: #f59e0b; }
    .green-text { color: #16a34a; }
  </style>
</head>
<body>

<h2>🏦 Smart Saving IoT Dashboard</h2>

<div class="status-bar">
  <div class="dot" id="dot"></div>
  <span id="mqtt-label">MQTT Offline</span>
</div>

<div class="row">
  <div class="box"><div class="label">Total Saldo</div><div class="val" id="saldo">Rp 0</div></div>
  <div class="box"><div class="label">Uang Terakhir</div><div class="val dark" id="last">—</div></div>
  <div class="box"><div class="label">Transaksi</div><div class="val dark" id="tx">0</div></div>
  <div class="box"><div class="label">Progress</div><div class="val dark" id="pct">0%</div></div>
</div>

<div class="card">
  <b>📡 Status Sensor</b>
  <table>
    <tr><td>🎨 Warna TCS</td><td id="tcs">—</td></tr>
    <tr><td>⚖️ Berat HX711</td><td id="hx">—</td></tr>
    <tr><td>🏃 Gerak PIR</td><td id="pir">Tidak ada</td></tr>
    <tr><td>🧠 ANN Output</td><td id="ann">—</td></tr>
    <tr><td>📶 MQTT Broker</td><td id="broker">Offline</td></tr>
  </table>
</div>

<div class="card">
  <b>📋 Riwayat Transaksi</b>
  <div id="log"><div class="empty">Belum ada transaksi</div></div>
</div>

<!-- MQTT CONFIG -->
<div class="config">
  <b>⚙️ Konfigurasi MQTT</b>
  <div class="fields">
    <div class="field"><label>Broker Host</label><input id="host" value="127.0.0.1"></div>
    <div class="field"><label>Port WebSocket</label><input id="port" value="9001"></div>
    <div class="field"><label>Topic</label><input id="topic" value="smartsaving/uang"></div>
    <div class="field"><label>Target Tabungan (Rp)</label><input id="target" type="number" value="100000"></div>
  </div>
  <button class="btn-blue" onclick="connectMQTT()">🔌 Hubungkan MQTT</button>
</div>

<div class="btn-row">
  <button class="btn-green" onclick="simulate()">+ Simulasi Uang Masuk</button>
  <button class="btn-gray" onclick="resetDash()">↺ Reset</button>
</div>

<script>
  const noms   = [1000,2000,5000,10000,20000,50000,100000];
  const colors = {1000:'Abu-abu',2000:'Abu-abu',5000:'Coklat',10000:'Ungu',20000:'Hijau',50000:'Biru',100000:'Merah'};
  const berat  = {1000:'1.0g',2000:'1.1g',5000:'1.7g',10000:'1.7g',20000:'2.1g',50000:'2.4g',100000:'2.9g'};

  let saldo=0, tx=0, logs=[], client=null;

  function rp(n){ return 'Rp '+Number(n).toLocaleString('id-ID'); }
  function getTarget(){ return parseInt(document.getElementById('target').value)||100000; }

  function insertMoney(n){
    saldo+=n; tx++;
    document.getElementById('saldo').textContent = rp(saldo);
    document.getElementById('last').textContent  = rp(n);
    document.getElementById('tx').textContent    = tx;
    document.getElementById('pct').textContent   = Math.min(Math.round(saldo/getTarget()*100),100)+'%';
    document.getElementById('tcs').textContent   = colors[n]||'—';
    document.getElementById('hx').textContent    = berat[n]||'—';
    document.getElementById('ann').textContent   = rp(n);
    document.getElementById('pir').textContent   = 'Terdeteksi!';
    document.getElementById('pir').className     = 'orange';
    setTimeout(()=>{ document.getElementById('pir').textContent='Tidak ada'; document.getElementById('pir').className=''; }, 2500);
    const t = new Date().toLocaleTimeString('id-ID');
    logs.unshift({n,t});
    if(logs.length>6) logs.pop();
    renderLog();
  }

  function renderLog(){
    const el = document.getElementById('log');
    if(!logs.length){ el.innerHTML='<div class="empty">Belum ada transaksi</div>'; return; }
    el.innerHTML = logs.map((l,i)=>
      `<div class="log-item">
        <span class="nom">${rp(l.n)}</span>
        <span class="time">${l.t} — ${colors[l.n]||'?'}</span>
      </div>`
    ).join('');
  }

  function simulate(){
    insertMoney(noms[Math.floor(Math.random()*noms.length)]);
  }

  function resetDash(){
    saldo=0; tx=0; logs=[];
    ['saldo','last','tx','pct','tcs','hx','ann'].forEach(id=>{
      document.getElementById(id).textContent = id==='saldo'?'Rp 0':id==='tx'?'0':id==='pct'?'0%':'—';
    });
    document.getElementById('pir').textContent='Tidak ada';
    renderLog();
  }

  function connectMQTT(){
    const host  = document.getElementById('host').value.trim();
    const port  = document.getElementById('port').value.trim();
    const topic = document.getElementById('topic').value.trim();
    if(client){ client.end(); client=null; }

    client = mqtt.connect('ws://'+host+':'+port+'/mqtt');

    client.on('connect',()=>{
      document.getElementById('dot').className         = 'dot on';
      document.getElementById('mqtt-label').textContent= 'MQTT Online ✅';
      document.getElementById('broker').textContent    = 'Online';
      document.getElementById('broker').className      = 'green-text';
      client.subscribe(topic);
    });

    client.on('close',()=>{
      document.getElementById('dot').className         = 'dot';
      document.getElementById('mqtt-label').textContent= 'MQTT Offline';
      document.getElementById('broker').textContent    = 'Offline';
      document.getElementById('broker').className      = '';
    });

    // Format pesan dari mikrokontroler:
    // JSON: {"nominal": 10000}
    // Atau angka: 10000
    client.on('message',(t,payload)=>{
      const raw = payload.toString();
      let nominal = null;
      try { nominal = parseInt(JSON.parse(raw).nominal); }
      catch(e){ nominal = parseInt(raw); }
      if(!isNaN(nominal) && nominal>0) insertMoney(nominal);
    });
  }
</script>
</body>
</html>
