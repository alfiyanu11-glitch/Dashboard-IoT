<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Smart Saving IoT</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    h2 { margin-bottom: 16px; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .row { display: flex; gap: 12px; margin-bottom: 12px; }
    .box { flex: 1; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; text-align: center; }
    .label { font-size: 12px; color: #888; }
    .val { font-size: 24px; font-weight: bold; color: #16a34a; }
    .val.b { color: #222; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    td { padding: 6px 0; border-bottom: 1px solid #eee; }
    button { padding: 10px 20px; background: #16a34a; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin-right: 8px; }
    button.gray { background: #ddd; color: #333; }
  </style>
</head>
<body>
  <h2>🏦 Smart Saving IoT Dashboard</h2>

  <div class="row">
    <div class="box"><div class="label">Total Saldo</div><div class="val" id="saldo">Rp 0</div></div>
    <div class="box"><div class="label">Uang Terakhir</div><div class="val b" id="last">—</div></div>
    <div class="box"><div class="label">Transaksi</div><div class="val b" id="tx">0</div></div>
  </div>

  <div class="card">
    <b>Status Sensor</b>
    <table>
      <tr><td>🎨 Warna TCS</td><td id="tcs">—</td></tr>
      <tr><td>⚖️ Berat HX711</td><td id="hx">—</td></tr>
      <tr><td>🏃 Gerak PIR</td><td id="pir">Tidak ada</td></tr>
      <tr><td>🧠 ANN Output</td><td id="ann">—</td></tr>
    </table>
  </div>

  <div class="card">
    <b>Riwayat</b>
    <div id="log" style="margin-top:8px; font-size:13px; color:#555;">Belum ada transaksi</div>
  </div>

  <button onclick="sim()">+ Simulasi Uang Masuk</button>
  <button class="gray" onclick="reset()">Reset</button>

<script>
  const nom = [1000,2000,5000,10000,20000,50000,100000];
  const col = {1000:'Abu-abu',2000:'Abu-abu',5000:'Coklat',10000:'Ungu',20000:'Hijau',50000:'Biru',100000:'Merah'};
  const brt = {1000:'1.0g',2000:'1.1g',5000:'1.7g',10000:'1.7g',20000:'2.1g',50000:'2.4g',100000:'2.9g'};
  let saldo=0, tx=0, log=[];

  function rp(n){ return 'Rp '+n.toLocaleString('id-ID'); }

  function sim(){
    const n = nom[Math.floor(Math.random()*nom.length)];
    saldo+=n; tx++;
    document.getElementById('saldo').textContent = rp(saldo);
    document.getElementById('last').textContent  = rp(n);
    document.getElementById('tx').textContent    = tx;
    document.getElementById('tcs').textContent   = col[n];
    document.getElementById('hx').textContent    = brt[n];
    document.getElementById('ann').textContent   = rp(n);
    document.getElementById('pir').textContent   = 'Terdeteksi!';
    setTimeout(()=>document.getElementById('pir').textContent='Tidak ada', 2000);
    const t = new Date().toLocaleTimeString('id-ID');
    log.unshift(t+' — '+rp(n)+' ('+col[n]+')');
    if(log.length>5) log.pop();
    document.getElementById('log').innerHTML = log.join('<br>');
  }

  function reset(){
    saldo=0; tx=0; log=[];
    ['saldo','last','tx','tcs','hx','ann'].forEach(id=>document.getElementById(id).textContent=id==='saldo'?'Rp 0':'—');
    document.getElementById('tx').textContent  = '0';
    document.getElementById('pir').textContent = 'Tidak ada';
    document.getElementById('log').textContent = 'Belum ada transaksi';
  }
</script>
</body>
</html>
